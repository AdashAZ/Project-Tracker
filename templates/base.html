<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Project Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='android-chrome-512x512.png') }}">
  </head>

  <body>
    <header>
      <nav class="navbar">
        <div class="nav-left">
          <a href="{{ url_for('dashboard') }}">Dashboard</a>
          <a href="{{ url_for('new_project') }}">New Project</a>
        </div>
        <a
          class="nav-logo-link"
          href="{{ url_for('dashboard') }}"
          aria-label="Go to Dashboard"
          title="Dashboard"
        >
          <img
            class="nav-logo"
            src="{{ url_for('static', filename='favicon-32x32.png') }}"
            alt="Project Tracker"
          >
        </a>
      </nav>
    </header>

    <main class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
