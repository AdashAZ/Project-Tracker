{% extends "base.html" %}

{% block title %}Admin Logs - Project Tracker{% endblock %}

{% block content %}
<div class="admin-logs">
    <div class="admin-header">
        <h1>System Logs</h1>
        <p>View system activity and error messages</p>
    </div>

    <section class="admin-section">
        <div class="section-title-row">
            <h2>Log Viewer</h2>
            <span class="section-caption">Recent system activity and errors</span>
        </div>
        
        <div class="log-controls">
            <button type="button" class="btn-secondary" id="refresh-logs-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Refresh
            </button>
            <button type="button" class="btn-secondary" id="clear-logs-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"></path>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                </svg>
                Clear Logs
            </button>
            <div class="log-filter">
                <label for="log-level-filter">Filter by Level:</label>
                <select id="log-level-filter">
                    <option value="all">All Levels</option>
                    <option value="ERROR">Error</option>
                    <option value="WARNING">Warning</option>
                    <option value="INFO">Info</option>
                    <option value="DEBUG">Debug</option>
                </select>
            </div>
        </div>

        <div class="log-container">
            <pre id="log-content">{{ logs }}</pre>
        </div>
    </section>
</div>

<!-- Custom Modal Overlay -->
<div id="logs-modal-overlay" class="custom-modal-overlay">
    <div class="custom-modal">
        <div class="custom-modal-header">
            <div class="custom-modal-title" id="logs-modal-title">Confirm Action</div>
        </div>
        <div class="custom-modal-body" id="logs-modal-body">
            Are you sure you want to proceed?
        </div>
        <div class="custom-modal-actions">
            <button type="button" class="custom-modal-btn secondary" id="logs-modal-cancel">Cancel</button>
            <button type="button" class="custom-modal-btn danger" id="logs-modal-confirm">Confirm</button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const logContent = document.getElementById('log-content');
    const refreshBtn = document.getElementById('refresh-logs-btn');
    const clearBtn = document.getElementById('clear-logs-btn');
    const filterSelect = document.getElementById('log-level-filter');
    const modalOverlay = document.getElementById('logs-modal-overlay');
    const modalTitle = document.getElementById('logs-modal-title');
    const modalBody = document.getElementById('logs-modal-body');
    const modalCancel = document.getElementById('logs-modal-cancel');
    const modalConfirm = document.getElementById('logs-modal-confirm');
    
    let pendingAction = null;

    function showModal(title, body, action) {
        modalTitle.textContent = title;
        modalBody.textContent = body;
        pendingAction = action;
        modalOverlay.classList.add('show');
    }

    function hideModal() {
        modalOverlay.classList.remove('show');
        pendingAction = null;
    }

    function filterLogs(level) {
        const lines = logContent.textContent.split('\n');
        const filteredLines = lines.filter(line => {
            if (level === 'all') return true;
            return line.includes(` - ${level} - `);
        });
        logContent.textContent = filteredLines.join('\n');
    }

    refreshBtn.addEventListener('click', () => {
        // Reload the page to get fresh logs
        location.reload();
    });

    clearBtn.addEventListener('click', () => {
        showModal(
            'Clear Logs',
            'This will clear all log entries. This action cannot be undone. Continue?',
            'clear_logs'
        );
    });

    filterSelect.addEventListener('change', () => {
        filterLogs(filterSelect.value);
    });

    modalCancel.addEventListener('click', hideModal);
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) hideModal();
    });

    modalConfirm.addEventListener('click', async () => {
        if (pendingAction === 'clear_logs') {
            hideModal();
            try {
                const response = await fetch('/admin/clear_logs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('input[name="_csrf_token"]').value
                    }
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccessMessage('Logs cleared successfully');
                    location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                showErrorMessage('Error clearing logs: ' + error.message);
            }
        }
    });

    function showSuccessMessage(message) {
        // Create a temporary success message
        const successDiv = document.createElement('div');
        successDiv.className = 'alert alert-success';
        successDiv.textContent = message;
        successDiv.style.position = 'fixed';
        successDiv.style.top = '20px';
        successDiv.style.right = '20px';
        successDiv.style.backgroundColor = '#d4edda';
        successDiv.style.border = '1px solid #c3e6cb';
        successDiv.style.color = '#155724';
        successDiv.style.padding = '10px 20px';
        successDiv.style.borderRadius = '4px';
        successDiv.style.zIndex = '1000';
        
        document.body.appendChild(successDiv);
        
        setTimeout(() => {
            successDiv.remove();
        }, 5000);
    }

    function showErrorMessage(message) {
        // Create a temporary error message
        const errorDiv = document.createElement('div');
        errorDiv.className = 'alert alert-danger';
        errorDiv.textContent = message;
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '20px';
        errorDiv.style.right = '20px';
        errorDiv.style.backgroundColor = '#f8d7da';
        errorDiv.style.border = '1px solid #f5c6cb';
        errorDiv.style.color = '#721c24';
        errorDiv.style.padding = '10px 20px';
        errorDiv.style.borderRadius = '4px';
        errorDiv.style.zIndex = '1000';
        
        document.body.appendChild(errorDiv);
        
        setTimeout(() => {
            errorDiv.remove();
        }, 5000);
    }
});
</script>
{% endblock %}
